<!DOCTYPE html>
<html>
<body style="background-color: lightblue; text-align:center;">

  <section>
    <img class="mySlides" src="pic1.png" style="height:200px;" align="center">
    <img class="mySlides" src="pic1.png" style="height:200px;">
    <img class="mySlides" src="pic2.jpg" style="height:200px;">
    <img class="mySlides" src="pic2.jpg" style="height:200px;">
     <img class="mySlides" src="pic3.jpeg" style="height:200px;">
    <img class="mySlides" src="pic3.jpeg" style="height:200px;">
     <img class="mySlides" src="pic4.jpeg" style="height:200px;">
    <img class="mySlides" src="pic4.jpeg" style="height:200px;">
     <img class="mySlides" src="pic5.jpg" style="height:200px;">
    <img class="mySlides" src="pic5.jpg" style="height:200px;">
  </section>

<script>
var myIndex = 0;
carousel();

function carousel() {
  var i;
  var x = document.getElementsByClassName("mySlides");

  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";
  }

  myIndex++;

  if (myIndex > x.length) {
    myIndex = 1;
  }

  x[myIndex - 1].style.display = "block";

  setTimeout(carousel, 3000);
}
</script>

</body>
</html>
