<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background-color: rgb(245, 152, 255);
            text-align: center;
            justify-content: center;
        }
        .box{
            background-color: rgb(246, 238, 238);
            width: 100px;
            height: 80px;
            line-height: 100px;
            border: 10px solid black;
        }
    </style>
</head>
<body>
     <header style="background-color: rgb(213, 216, 255);"> 
    <h1 style="text-align: center;">Flex box </h1>
    </header>
    <img src="images.jpeg" center-align>
    <div class="container">
        <div class="box">Minion </div>
        <div class="box">Cutie </div>
        <div class="box">Study</div>
        <div class="box">Butterfly</div>

    </div>
</body>
</html>
