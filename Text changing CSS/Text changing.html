<!DOCTYPE html>
<html>
<head>
    <title>Modern Color Changer</title>
    <meta charset="UTF-8">

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to left, #febce1e4, #ffb2d9);
            color: white;
        }

        h2 {
            margin-top: 50px;
        }

        #myElement {
            border: 2px solid #fff;
            width: 200px;
            height: 100px;
            line-height: 100px;
            margin: 20px auto;
            border-radius: 12px;
            transition: all 0.3s ease;
            background-color: rgba(255,255,255,0.1);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background-color: #9299ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #9299ff;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<h2>Change Font Color with CSS</h2>

<div id="myElement">My name is Sarah!</div>

<button onclick="changeStyle()">Click Me</button>

<script>
    let islightblue = false;

    function changeStyle() {
        var element = document.getElementById("myElement");

        if (islightblue) {
            element.style.color = "white";
        } else {
            element.style.color = "#0000FF";
        }

        islightblue = !islightblue;
    }
</script>

</body>
</html>
