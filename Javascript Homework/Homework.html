<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Using Functions</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        img {
            width: 120px;
            margin-bottom: 15px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            color: #222;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Image -->
        <img src="https://cdn-icons-png.flaticon.com/512/2913/2913465.png" alt="math image">

        <h2>Multiply Two Numbers</h2>

        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">

        <br>

        <button onclick="multiplyNumbers()">Multiply</button>

        <h3 id="result"></h3>

    </div>

    <script>
        function multiplyNumbers() {
            let number1 = document.getElementById("num1").value;
            let number2 = document.getElementById("num2").value;

            if (number1 === "" || number2 === "") {
                document.getElementById("result").innerText = "Please enter both numbers!";
                return;
            }

            let product = Number(number1) * Number(number2);

            document.getElementById("result").innerText = "Result: " + product;
        }
    </script>

</body>
</html>
