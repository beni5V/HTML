<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Food Slider</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            overflow:hidden;
        }

        h1{
            font-size:50px;
            color:#fff;
            margin-bottom:25px;
            text-shadow:3px 3px 10px rgba(0,0,0,0.4);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                text-shadow:0 0 10px #fff;
            }
            to{
                text-shadow:0 0 25px #ff6600;
            }
        }

        .slider{
            width:85%;
            max-width:1000px;
            height:500px;
            overflow:hidden;
            border-radius:25px;
            position:relative;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
            border:5px solid white;
        }

        .slides{
            display:flex;
            width:700%;
            height:100%;
            animation: slide 28s infinite;
        }

        .slides img{
            width:100%;
            height:500px;
            object-fit:cover;
            transition:transform 0.5s ease;
        }

        .slides img:hover{
            transform:scale(1.05);
        }

        @keyframes slide{
            0%{margin-left:0;}
            10%{margin-left:0;}

            15%{margin-left:-100%;}
            25%{margin-left:-100%;}

            30%{margin-left:-200%;}
            40%{margin-left:-200%;}

            45%{margin-left:-300%;}
            55%{margin-left:-300%;}

            60%{margin-left:-400%;}
            70%{margin-left:-400%;}

            75%{margin-left:-500%;}
            85%{margin-left:-500%;}

            90%{margin-left:-600%;}
            100%{margin-left:-600%;}
        }

        .overlay{
            position:absolute;
            bottom:0;
            width:100%;
            background:rgba(0,0,0,0.5);
            color:white;
            padding:20px;
            text-align:center;
            backdrop-filter:blur(4px);
        }

        .overlay h2{
            font-size:35px;
            margin-bottom:10px;
        }

        .overlay p{
            font-size:18px;
            color:#f1f1f1;
        }

        .dots{
            margin-top:20px;
        }

        .dots span{
            height:15px;
            width:15px;
            margin:5px;
            background:white;
            display:inline-block;
            border-radius:50%;
            animation: blink 1.5s infinite;
        }

        .dots span:nth-child(2){
            animation-delay:0.2s;
        }

        .dots span:nth-child(3){
            animation-delay:0.4s;
        }

        @keyframes blink{
            0%{
                transform:scale(1);
                opacity:0.5;
            }
            50%{
                transform:scale(1.4);
                opacity:1;
            }
            100%{
                transform:scale(1);
                opacity:0.5;
            }
        }

        button{
            margin-top:25px;
            padding:14px 35px;
            border:none;
            border-radius:40px;
            background:#ff6600;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.4s;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        button:hover{
            background:#ff3300;
            transform:translateY(-5px) scale(1.05);
        }

    </style>
</head>

<body>

    <h1>🍕 Delicious Food Gallery 🍔</h1>

    <div class="slider">

        <div class="slides">

            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1200" alt="Pizza">

            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1200" alt="Burger">

            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1200" alt="Salad">

            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200" alt="Food">

            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200" alt="Restaurant Food">

            <img src="https://images.unsplash.com/photo-1525755662778-989d0524087e?q=80&w=1200" alt="Fries">

            <img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?q=80&w=1200" alt="Pasta">

        </div>

        <div class="overlay">
            <h2>Taste the Happiness 😋</h2>
            <p>Fresh • Delicious • Beautiful Food</p>
        </div>

    </div>

    <div class="dots">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <button>Order Now 🍟</button>

</body>
</html>
