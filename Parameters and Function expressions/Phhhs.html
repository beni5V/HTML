<!DOCTYPE html>
<html>
  <head>
    <title>Function Example</title>
  </head>
  <body>
     <header style="background-color: rgb(255, 142, 230);" float="left">
        <h1 style="text-align: center;">Example Project For Understanding Functions.</h1></div>
    </header>
    <script>
      let oddOrEven = function (number) {
        if (number % 2 == 0) {
          document.write(number + " is an even number");
        } else {
          document.write(number + " is an odd number");
        }
      }
      let number = prompt("Enter the number:");
      oddOrEven(number);
    </script>
  </body>
</html>
