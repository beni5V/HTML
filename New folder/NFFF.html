<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Carousel Example</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
  <body>
<div class="container">
    <header style="background-color: rgb(255, 242, 186);" float="left">
        <h1 style="text-align: center;">Carousel Examples</h1></div>
    </header>
<div id="myCarousel" class="carousel slide" data-ride="carousel">
<!-- Indicators -->
<ol class="carousel-indicators">
<li data-target="#myCarousel" data-slide-to="0" class="active"></li>
<li data-target="#myCarousel" data-slide-to="1"></li>
<li data-target="#myCarousel" data-slide-to="2"></li>
</ol>
<!-- Wrapper for slides -->
<div class="carousel-inner">

<div class="item active">
<img src="Frog.jpeg" alt="Frog" style="width:200px; height:300px;">
</div>
<div class="item">

<img src="Whale.jpg" alt="Whale" style="width:200px; height:300px;">
</div>
<div class="item">
<img src="Penguin.webp" alt="Penguin" style="width:200px; height:300px;">

</div>
</div>

<!-- Left and right controls -->
<a class="left carousel-control" href="" data-slide="prev">
<span class="glyphicon glyphicon-chevron-left"></span>
<span class="sr-only">Previous</span>


</a>
<a class="right carousel-control" href="#myCarousel" data-slide="next">
<span class="glyphicon glyphicon-chevron-right"></span>
<span class="sr-only">Next</span>
</a>
</div>
</div>

</body>
</html>
