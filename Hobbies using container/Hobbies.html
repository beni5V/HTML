<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobby Section</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .hobby-section {
            padding: 50px 0;
        }

        .hobby-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .hobby-card:hover {
            transform: scale(1.05);
        }

        .hobby-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container hobby-section">
        <h2>My Hobbies</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="hobby-card">
                    <div class="hobby-icon">📚</div>
                    <h4>Reading</h4>
                    <p>I love reading books to gain knowledge and relax my mind.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="hobby-card">
                    <div class="hobby-icon">⚽</div>
                    <h4>Playing Sports</h4>
                    <p>Sports keep me active, healthy, and energetic.</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="hobby-card">
                    <div class="hobby-icon">🎨</div>
                    <h4>Drawing</h4>
                    <p>I enjoy expressing creativity through art and colors.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
