<!DOCTYPE html>
<html>
    <head>
        <title>Navigation Bar</title>
        <style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: beige;
  }
  .topnav {
    overflow: hidden;
    background-color: #b7a8ff;
  }
  .topnav a {
    float: left;
    color: #000000;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    font-size: 17px;
  }
  .topnav a:hover {
    background-color: #b9e1e0;
    color: rgb(0, 0, 0);
  }
  .topnav a.active {
    background-color: #b9e1e0;
    color: black;
  }
</style>
</head>

<body>
  <div class="topnav">
    <a class="active" href="#home">Home</a>
    <a href="#">About Us</a>
    <a href="#">Gallery</a>
    <a href="#">Contact Us</a>
  </div>

</body>
</html>
